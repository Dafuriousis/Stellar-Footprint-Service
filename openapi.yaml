openapi: 3.0.3
info:
  title: Stellar Footprint Service API
  description: |
    Pre-flight simulation and footprint extraction for Soroban smart contract transactions.

    This service automates the complex footprint extraction process — a required step before
    submitting any Soroban transaction to the Stellar network.
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: /api/v1
    description: Current API version

tags:
  - name: simulation
    description: Transaction simulation and footprint extraction
  - name: utilities
    description: XDR decoding, health checks, and cache management
  - name: network
    description: Network status and information

paths:
  /health:
    get:
      tags: [utilities]
      summary: Liveness check (deprecated alias)
      description: |
        Returns service liveness status. Deprecated — use `/health/live` instead.
        Kept for backwards compatibility with load balancers and uptime monitors.
      operationId: getHealth
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                uptime: 123.45
                version: 1.0.0
                timestamp: "2024-01-01T00:00:00.000Z"

  /health/live:
    get:
      tags: [utilities]
      summary: Liveness check
      description: |
        Returns service liveness status. Use this endpoint with Kubernetes `livenessProbe`
        and load-balancer health checks.
      operationId: getLiveness
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                uptime: 123.45
                version: 1.0.0
                timestamp: "2024-01-01T00:00:00.000Z"

  /health/ready:
    get:
      tags: [utilities]
      summary: Readiness check
      description: |
        Returns readiness status. Checks whether the cache backend and RPC circuit breaker
        are healthy. Use with Kubernetes `readinessProbe` — traffic is only sent to pods
        that return `200` here.
      operationId: getReadiness
      responses:
        "200":
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: ready
                checks:
                  cache:
                    status: healthy
                    details:
                      backend: redis
                  rpcCircuitBreaker:
                    status: healthy
                    details:
                      state: closed
                      failureCount: 0
                timestamp: "2024-01-01T00:00:00.000Z"
        "503":
          description: Service is not ready (cache or RPC unhealthy)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: not ready
                checks:
                  cache:
                    status: unhealthy
                    details:
                      error: "Connection refused"
                  rpcCircuitBreaker:
                    status: healthy
                    details:
                      state: closed
                      failureCount: 0
                timestamp: "2024-01-01T00:00:00.000Z"

  /simulate:
    post:
      tags: [simulation]
      summary: Simulate a Soroban transaction
      description: |
        Submits a transaction XDR to the Stellar RPC `simulateTransaction` endpoint,
        extracts the footprint (read-only and read-write ledger keys), and returns
        resource cost estimates.

        Results are cached by a hash of the request body. The `X-Cache` response header
        indicates whether the result was served from cache (`HIT`) or freshly simulated (`MISS`).
      operationId: simulate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateRequest"
            example:
              xdr: "AAAAAgAAAAC..."
              network: testnet
      responses:
        "200":
          description: Simulation succeeded
          headers:
            X-Cache:
              description: Whether the result was served from cache
              schema:
                type: string
                enum: [HIT, MISS]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateSuccessResponse"
              example:
                success: true
                footprint:
                  readOnly: ["AAAABgAAAAHZ...", "AAAABgAAAAHa..."]
                  readWrite: ["AAAABgAAAAHb..."]
                cost:
                  cpuInsns: "1234567"
                  memBytes: "8192"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          description: Simulation failed (contract error or restoration required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateFailureResponse"
              examples:
                contractError:
                  summary: Contract execution error
                  value:
                    success: false
                    error: "contract panic: assertion failed"
                restoreRequired:
                  summary: Ledger entry restoration required
                  value:
                    success: false
                    error: "Transaction requires ledger entry restoration before simulation."
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /simulate/batch:
    post:
      tags: [simulation]
      summary: Simulate multiple Soroban transactions
      description: |
        Simulates up to 10 transactions concurrently. Each transaction is processed
        independently; failures in one entry do not affect others.

        The `X-Cache` header reflects aggregate cache status: `HIT` (all cached),
        `PARTIAL` (some cached), or `MISS` (none cached).
      operationId: simulateBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateBatchRequest"
            example:
              transactions:
                - xdr: "AAAAAgAAAAC..."
                - xdr: "AAAAAgAAAAD..."
              network: testnet
      responses:
        "200":
          description: Batch processed (individual results may contain errors)
          headers:
            X-Cache:
              description: Aggregate cache status across all results
              schema:
                type: string
                enum: [HIT, PARTIAL, MISS]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateBatchResponse"
              example:
                results:
                  - index: 0
                    success: true
                    footprint:
                      readOnly: ["AAAABgAAAAHZ..."]
                      readWrite: ["AAAABgAAAAHb..."]
                    cost:
                      cpuInsns: "1234567"
                      memBytes: "8192"
                  - index: 1
                    success: false
                    error: "contract panic: assertion failed"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /simulate/cost-breakdown:
    get:
      tags: [simulation]
      summary: Detailed cost breakdown
      description: |
        Returns a detailed breakdown of Soroban resource fees given raw CPU instruction
        and memory byte counts. Useful for building fee estimation UIs without running
        a full simulation.
      operationId: getCostBreakdown
      parameters:
        - name: cpuInsns
          in: query
          required: true
          description: CPU instructions count (non-negative integer string)
          schema:
            type: string
            example: "1234567"
        - name: memBytes
          in: query
          required: true
          description: Memory bytes count (non-negative integer string)
          schema:
            type: string
            example: "8192"
        - name: network
          in: query
          required: false
          description: Stellar network to use for fee parameters
          schema:
            type: string
            enum: [testnet, mainnet, futurenet]
            default: testnet
      responses:
        "200":
          description: Cost breakdown calculated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostBreakdownResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /network/status:
    get:
      tags: [network]
      summary: Network status
      description: |
        Returns current Stellar network information including the latest ledger sequence
        and network passphrase. Response is cached for 10 seconds.
      operationId: getNetworkStatus
      parameters:
        - name: network
          in: query
          required: false
          description: Network to query
          schema:
            type: string
            enum: [testnet, mainnet, futurenet]
            default: testnet
      responses:
        "200":
          description: Network status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkStatusResponse"
              example:
                success: true
                data:
                  latestLedger: 12345678
                  passphrase: "Test SDF Network ; September 2015"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /footprint/diff:
    post:
      tags: [simulation]
      summary: Compare two footprints
      description: |
        Compares two footprints and returns the difference (entries added, removed, or
        changed between reads). Useful for auditing how a contract update changes its
        ledger access pattern.
      operationId: footprintDiff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FootprintDiffRequest"
            example:
              before:
                readOnly: ["AAAABgAAAAHZ..."]
                readWrite: ["AAAABgAAAAHb..."]
              after:
                readOnly: ["AAAABgAAAAHZ...", "AAAABgAAAAHc..."]
                readWrite: []
      responses:
        "200":
          description: Diff computed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /validate:
    post:
      tags: [utilities]
      summary: Validate transaction XDR
      description: |
        Validates a transaction XDR without simulating it against the network.
        Use this to detect structural issues (malformed XDR, missing fields) before
        incurring the cost of a full simulation.
      operationId: validateXdr
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateRequest"
            example:
              xdr: "AAAAAgAAAAC..."
              network: testnet
      responses:
        "200":
          description: XDR is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeResponse"
              example:
                success: true
                data:
                  message: "XDR is valid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /decode:
    get:
      tags: [utilities]
      summary: Decode XDR to human-readable JSON
      description: |
        Decodes a base64-encoded XDR string into a human-readable JSON representation.
        Useful for debugging transaction structures and ledger entries.

        Supported `type` values: `transaction`, `operation`, `ledger_key`.
      operationId: decodeXdr
      parameters:
        - name: xdr
          in: query
          required: true
          description: Base64-encoded XDR string to decode
          schema:
            type: string
            example: "AAAAAgAAAAC..."
        - name: type
          in: query
          required: false
          description: |
            XDR type for decoding. Defaults to `transaction`.
            Supported values: `transaction`, `operation`, `ledger_key`.
          schema:
            type: string
            enum: [transaction, operation, ledger_key]
            default: transaction
      responses:
        "200":
          description: XDR decoded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecodeResponse"
              example:
                success: true
                type: transaction
                decoded:
                  fee: 100
                  operations: []
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /restore:
    post:
      tags: [simulation]
      summary: Build a ledger entry restoration transaction
      description: |
        Builds a restoration transaction for expired ledger entries referenced by the
        provided XDR. Submit this transaction to the network before retrying `/simulate`
        when you receive a `422` with `"restoration required"`.
      operationId: restore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreRequest"
            example:
              xdr: "AAAAAgAAAAC..."
              network: testnet
      responses:
        "200":
          description: Restoration transaction built successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeResponse"
              example:
                success: true
                data:
                  restoreXdr: "AAAAAgAAAAD..."
                  network: testnet
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /estimate-fee:
    post:
      tags: [simulation]
      summary: Estimate transaction fee
      description: |
        Returns a fee estimate given raw resource usage values (`cpuInsns`, `memBytes`).
        Use the values from a `/simulate` response to compute the fee before building
        and signing the final transaction.
      operationId: estimateFee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateFeeRequest"
            example:
              cpuInsns: "1234567"
              memBytes: "8192"
              network: testnet
      responses:
        "200":
          description: Fee estimate calculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateFeeResponse"
              example:
                inclusionFee: "100"
                resourceFee: "850"
                totalFee: "950"
                network: testnet
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /cache:
    delete:
      tags: [utilities]
      summary: Flush simulation cache
      description: |
        Flushes all entries from the simulation cache (Redis or in-memory LRU depending
        on configuration). Use this to force fresh simulations after a contract upgrade
        or network parameter change.
      operationId: invalidateCache
      responses:
        "200":
          description: Cache flushed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheInvalidateResponse"
              example:
                message: "Cache invalidated"
                backend: redis
        "500":
          $ref: "#/components/responses/InternalServerError"

  /openapi.json:
    get:
      tags: [utilities]
      summary: OpenAPI specification (JSON)
      description: Serves the raw OpenAPI specification as JSON.
      operationId: getOpenApiSpec
      responses:
        "200":
          description: OpenAPI specification
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  responses:
    BadRequest:
      description: Missing or invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeErrorResponse"
          example:
            success: false
            error: "Missing required field: xdr"

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        RateLimit-Limit:
          description: Maximum requests allowed in the window
          schema:
            type: integer
          example: 60
        RateLimit-Remaining:
          description: Requests remaining in the current window
          schema:
            type: integer
          example: 0
        RateLimit-Reset:
          description: Unix timestamp (seconds) when the window resets
          schema:
            type: integer
          example: 1700000060
        X-RateLimit-Limit:
          description: Legacy alias for RateLimit-Limit
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: Legacy alias for RateLimit-Remaining
          schema:
            type: integer
        X-RateLimit-Reset:
          description: Legacy alias for RateLimit-Reset
          schema:
            type: integer
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
          example: 60
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RateLimitErrorResponse"
          example:
            error: "Too Many Requests"
            message: "Rate limit exceeded. Try again in 60 seconds."
            retryAfter: 60

    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeErrorResponse"
          example:
            success: false
            error: "Unexpected error"

    ServiceUnavailable:
      description: RPC circuit breaker is open; service temporarily unavailable
      headers:
        Retry-After:
          description: Seconds until the circuit breaker attempts recovery
          schema:
            type: integer
          example: 28
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EnvelopeErrorResponse"
          example:
            success: false
            error: "RPC circuit breaker is open. Try again later."

  schemas:
    # ── Shared envelope ──────────────────────────────────────────────────────
    EnvelopeResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        data:
          description: Response payload (shape varies by endpoint)
          additionalProperties: true

    EnvelopeErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
          description: Human-readable error message

    RateLimitErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "Too Many Requests"
        message:
          type: string
          description: Extended message with retry guidance
          example: "Rate limit exceeded. Try again in 60 seconds."
        retryAfter:
          type: integer
          description: Seconds to wait before retrying
          example: 60

    # ── Health ───────────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      required: [status, uptime, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        uptime:
          type: number
          description: Process uptime in seconds
        version:
          type: string
          description: Service version from package.json
        timestamp:
          type: string
          format: date-time

    ReadinessResponse:
      type: object
      required: [status, checks, timestamp]
      properties:
        status:
          type: string
          enum: [ready, "not ready"]
        checks:
          type: object
          properties:
            cache:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                details:
                  type: object
                  additionalProperties: true
            rpcCircuitBreaker:
              type: object
              properties:
                status:
                  type: string
                  enum: [healthy, unhealthy]
                details:
                  type: object
                  additionalProperties: true
        timestamp:
          type: string
          format: date-time

    # ── Simulation ───────────────────────────────────────────────────────────
    Network:
      type: string
      enum: [testnet, mainnet, futurenet]
      default: testnet
      description: Stellar network to use

    SimulateRequest:
      type: object
      required: [xdr]
      properties:
        xdr:
          type: string
          description: Base64-encoded Soroban transaction XDR
          example: "AAAAAgAAAAC..."
        network:
          $ref: "#/components/schemas/Network"
        ledgerSequence:
          type: integer
          description: Optional ledger sequence to simulate against (for reproducibility)
          example: 12345678

    SimulateBatchRequest:
      type: object
      required: [transactions]
      properties:
        transactions:
          type: array
          items:
            type: object
            required: [xdr]
            properties:
              xdr:
                type: string
                description: Base64-encoded Soroban transaction XDR
          minItems: 1
          maxItems: 10
          description: Array of transactions to simulate (maximum 10)
        network:
          $ref: "#/components/schemas/Network"

    Footprint:
      type: object
      required: [readOnly, readWrite]
      properties:
        readOnly:
          type: array
          items:
            type: string
          description: Base64-encoded read-only ledger keys
        readWrite:
          type: array
          items:
            type: string
          description: Base64-encoded read-write ledger keys

    ResourceCost:
      type: object
      required: [cpuInsns, memBytes]
      properties:
        cpuInsns:
          type: string
          description: CPU instructions consumed (string to avoid precision loss)
          example: "1234567"
        memBytes:
          type: string
          description: Memory bytes consumed (string to avoid precision loss)
          example: "8192"

    SimulateSuccessResponse:
      type: object
      required: [success, footprint, cost]
      properties:
        success:
          type: boolean
          enum: [true]
        footprint:
          $ref: "#/components/schemas/Footprint"
        cost:
          $ref: "#/components/schemas/ResourceCost"
        cacheHit:
          type: boolean
          description: Whether the result was served from cache

    SimulateFailureResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
          description: Human-readable error message from the simulation

    SimulateBatchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            oneOf:
              - allOf:
                  - $ref: "#/components/schemas/SimulateSuccessResponse"
                  - type: object
                    required: [index]
                    properties:
                      index:
                        type: integer
              - allOf:
                  - $ref: "#/components/schemas/SimulateFailureResponse"
                  - type: object
                    required: [index]
                    properties:
                      index:
                        type: integer

    # ── Cost breakdown ───────────────────────────────────────────────────────
    CostBreakdownResponse:
      type: object
      description: Detailed breakdown of Soroban resource fees

    # ── Network status ───────────────────────────────────────────────────────
    NetworkStatusResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            latestLedger:
              type: integer
              description: Latest closed ledger sequence
            passphrase:
              type: string
              description: Network passphrase

    # ── Footprint diff ───────────────────────────────────────────────────────
    FootprintDiffRequest:
      type: object
      required: [before, after]
      properties:
        before:
          $ref: "#/components/schemas/Footprint"
        after:
          $ref: "#/components/schemas/Footprint"

    # ── Decode ───────────────────────────────────────────────────────────────
    DecodeResponse:
      type: object
      required: [success, type, decoded]
      properties:
        success:
          type: boolean
        type:
          type: string
          description: XDR type used for decoding
          enum: [transaction, operation, ledger_key]
        decoded:
          type: object
          description: Human-readable JSON representation of the XDR
          additionalProperties: true

    # ── Restore ──────────────────────────────────────────────────────────────
    RestoreRequest:
      type: object
      required: [xdr]
      properties:
        xdr:
          type: string
          description: Base64-encoded Soroban transaction XDR that requires restoration
          example: "AAAAAgAAAAC..."
        network:
          $ref: "#/components/schemas/Network"

    # ── Fee estimation ───────────────────────────────────────────────────────
    EstimateFeeRequest:
      type: object
      required: [cpuInsns, memBytes]
      properties:
        cpuInsns:
          type: string
          description: CPU instructions (non-negative integer string)
          example: "1234567"
        memBytes:
          type: string
          description: Memory bytes (non-negative integer string)
          example: "8192"
        network:
          $ref: "#/components/schemas/Network"

    EstimateFeeResponse:
      type: object
      properties:
        inclusionFee:
          type: string
          description: Base inclusion fee in stroops
        resourceFee:
          type: string
          description: Soroban resource fee in stroops
        totalFee:
          type: string
          description: Total recommended fee in stroops
        network:
          type: string

    # ── Cache ─────────────────────────────────────────────────────────────────
    CacheInvalidateResponse:
      type: object
      required: [message, backend]
      properties:
        message:
          type: string
          example: "Cache invalidated"
        backend:
          type: string
          description: Cache backend that was flushed
          enum: [redis, memory]

    # ── Legacy (kept for backwards compatibility) ─────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message
